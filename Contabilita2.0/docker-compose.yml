  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contabilita20_celery
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://contabilita20:contabilita20@postgres:5432/contabilita20
      REDIS_URL: redis://redis:6379/0
    depends_on:
